<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>跳转中 — 互联网记忆</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f8fafc;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
      color: #64748b;
    }
    .card {
      text-align: center;
      max-width: 400px;
      padding: 40px 32px;
    }
    .logo {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 16px;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    p { font-size: 14px; line-height: 1.6; }
    .sub { font-size: 12px; color: #94a3b8; margin-top: 8px; }
  </style>
  <script>
    // GitHub Pages SPA 路由重定向
    (function() {
      var l = window.location;
      var base = '/828-internet-memory';
      var newPath = l.pathname.replace(base, '') || '/';
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        base + '/?p=' + encodeURIComponent(newPath)
      );
    })();
  </script>
</head>
<body>
  <div class="card">
    <div class="logo">记</div>
    <p>
      <span class="dot"></span>
      正在跳转至互联网记忆...
    </p>
    <p class="sub">如果未自动跳转，<a href="/828-internet-memory/" style="color:#3b82f6;">点击这里</a></p>
  </div>
</body>
</html>
