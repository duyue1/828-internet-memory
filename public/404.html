<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>互联网记忆</title>
  <script>
    // GitHub Pages SPA 路由重定向
    // 当用户直接访问 /event/xxx 时，GitHub Pages 会 404
    // 这个页面将重定向到 index.html 并保留路径
    const segmentCount = 1
    const l = window.location
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/828-internet-memory/?p=' + encodeURIComponent(l.pathname.replace('/828-internet-memory', '') || '/')
    )
  </script>
</head>
<body>
  <p>正在跳转...</p>
</body>
</html>
